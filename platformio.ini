; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = JC3248W535N
boards_dir = boards
data_dir = littlefs
lib_dir = libraries
src_dir = src

[env:base]
platform = espressif32@6.9.0
monitor_filters = esp32_exception_decoder
framework = espidf
build_type = debug
board_build.filesystem = littlefs
build_flags = 
	-DLOG_LOCAL_LEVEL=ESP_LOG_VERBOSE
	-DEEZ_PLATFORM_ESP32
	-DEEZ_FOR_LVGL
	-DLV_LVGL_H_INCLUDE_SIMPLE
	-Wno-maybe-uninitialized
extra_scripts = 
	pre:utils/write-version.py
	utils/merge-bin.py
monitor_speed = 115200
upload_speed = 921600

[env:JC3248W535N]
extends = env:base
board = JC3248W535N
board_build.partitions = partitions/default_16MB.csv
build_flags =
	${env:base.build_flags}
	-DFEAT_TUSB=1
	-DFEAT_SD=1
	-DLV_CONF_PATH='${PROJECT_DIR}/src/lv_conf_JC3248W535N.h'
lib_deps =
	symlink://deps/tinyusb
	symlink://deps/esp_tinyusb

[env:ESP32_3248S035C]
extends = env:base
board = ESP32_3248S035C
board_build.partitions = partitions/default_4MB.csv
build_flags =
	${env:base.build_flags}
	-DLV_CONF_PATH='${PROJECT_DIR}/src/lv_conf_ESP32_3248S035C.h'